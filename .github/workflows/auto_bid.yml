name: 자동입찰 실행

on:
  schedule:
    - cron: "0 * * * *"   # 매시 정각 실행 (UTC 기준 → 한국시간 +9)
  workflow_dispatch:        # 깃헙에서 수동 실행 버튼
    inputs:
      dry_run:
        description: "테스트 모드 (실제 입찰가 변경 안 함)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  bid:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 자동입찰 실행
        env:
          NAVER_AD_API_KEY:             ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY:          ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID:         ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRY_RUN:                      ${{ github.event.inputs.dry_run || 'false' }}
        run: python bidder.py
